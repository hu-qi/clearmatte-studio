<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="ClearMatte Studio is a browser-based background removal workspace that runs client-side AI matting."
    />
    <meta name="keywords" content="ClearMatte, background removal, AI matting, transparent PNG, image editor" />
    <link rel="canonical" href="https://clearmatte.huqi.host/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ClearMatte Studio" />
    <meta property="og:description" content="A browser-based background removal workspace that runs client-side AI matting." />
    <meta property="og:url" content="https://clearmatte.huqi.host/" />
    <meta property="og:image" content="https://clearmatte.huqi.host/imgs/clearmatte_horizontal_logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@huqii" />
    <meta name="twitter:creator" content="@huqii" />
    <meta name="twitter:title" content="ClearMatte Studio" />
    <meta name="twitter:description" content="A browser-based background removal workspace that runs client-side AI matting." />
    <meta name="twitter:image" content="https://clearmatte.huqi.host/imgs/clearmatte_horizontal_logo.png" />
    <title>ClearMatte Studio</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://huggingface.co" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./imgs/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./imgs/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./imgs/favicon_io/apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="ClearMatte Studio">
          <img class="brand-mark" src="./imgs/clearmatte_horizontal_logo.png" alt="ClearMatte Studio logo" />
          <h1 class="sr-only">ClearMatte Studio</h1>
        </div>

        <div class="topbar-actions">
          <span class="runtime-pill" id="runtimePill">Ready</span>
          <button class="ghost-button" id="resetButton" type="button" disabled>Reset</button>
          <button class="primary-button" id="exportButton" type="button" disabled>
            Export PNG
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="stage-area" aria-label="Image workspace">
          <div class="stage-toolbar" aria-label="Preview controls">
            <div class="segmented" role="tablist" aria-label="Preview background">
              <button class="segment active" type="button" data-bg="checker">Grid</button>
              <button class="segment" type="button" data-bg="white">White</button>
              <button class="segment" type="button" data-bg="charcoal">Dark</button>
              <button class="segment" type="button" data-bg="color">Color</button>
            </div>
            <label class="swatch-label" aria-label="Custom background color">
              <input id="backgroundColor" type="color" value="#62c9aa" />
            </label>
            <button class="tool-button" id="compareButton" type="button" disabled>Compare</button>
          </div>

          <div class="stage" id="dropZone">
            <div class="canvas-frame checker" id="canvasFrame">
              <canvas id="previewCanvas" width="1280" height="960"></canvas>
              <div class="empty-state" id="emptyState">
                <span class="empty-icon" aria-hidden="true"></span>
                <strong>Drop Image</strong>
                <span>PNG, JPEG, WebP</span>
              </div>
              <div class="compare-handle hidden" id="compareHandle" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <aside class="control-panel" aria-label="Controls">
          <label class="upload-control" for="fileInput">
            <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
            <span>Choose Image</span>
          </label>

          <button class="primary-button wide" id="processButton" type="button" disabled>
            Remove Background
          </button>

          <div class="status-panel" aria-live="polite">
            <div class="status-row">
              <span id="statusText">Waiting for an image</span>
              <span id="statusDetail">0%</span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span class="progress-fill" id="progressFill"></span>
            </div>
          </div>

          <div class="control-group">
            <div class="control-heading">
              <span>Matte</span>
              <button class="mini-button" id="applyAdjustmentsButton" type="button" disabled>
                Apply
              </button>
            </div>

            <label class="range-row">
              <span>Cutoff</span>
              <input id="cutoffRange" type="range" min="0" max="100" value="42" />
              <output id="cutoffValue">42</output>
            </label>

            <label class="range-row">
              <span>Softness</span>
              <input id="softnessRange" type="range" min="0" max="100" value="14" />
              <output id="softnessValue">14</output>
            </label>

            <label class="range-row">
              <span>Clean</span>
              <input id="cleanRange" type="range" min="0" max="100" value="8" />
              <output id="cleanValue">8</output>
            </label>
          </div>

          <div class="control-group">
            <div class="control-heading">
              <span>Output</span>
            </div>
            <label class="select-row">
              <span>Max Edge</span>
              <select id="maxEdgeSelect">
                <option value="2048">2048 px</option>
                <option value="3072" selected>3072 px</option>
                <option value="4096">4096 px</option>
              </select>
            </label>
            <label class="toggle-row">
              <input id="transparentToggle" type="checkbox" checked />
              <span>Transparent PNG</span>
            </label>
          </div>

          <div class="meta-panel">
            <dl>
              <div>
                <dt>Model</dt>
                <dd>BiRefNet lite 512</dd>
              </div>
              <div>
                <dt>License</dt>
                <dd>MIT</dd>
              </div>
              <div>
                <dt>Runtime</dt>
                <dd id="runtimeDetail">Auto</dd>
              </div>
            </dl>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
