<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearMatte Studio Offline</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="ClearMatte Studio">
          <img class="brand-mark" src="./imgs/logo.png" alt="ClearMatte logo" />
          <span class="brand-copy">
            <strong>ClearMatte</strong>
            <span>Studio</span>
          </span>
        </div>
      </header>
      <main class="workspace" style="padding: 48px; text-align: center;">
        <h1>Offline mode</h1>
        <p>ClearMatte Studio is not available because your network connection is offline.</p>
        <p>Reload the page once you are back online.</p>
      </main>
    </div>
  </body>
</html>
